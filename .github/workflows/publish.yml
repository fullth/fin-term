name: publish

# v* 태그를 push 하면 빌드 후 npm 에 배포한다.
#   git tag v0.3.1 && git push origin v0.3.1
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing(OIDC) + provenance 용
    steps:
      - uses: actions/checkout@v4

      # registry-url 을 주면 setup-node 가 .npmrc 에 빈 authToken 라인을 박아 OIDC 를 막는다.
      # OIDC(Trusted Publishing)는 기본 registry 를 쓰므로 registry-url 없이 둔다.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # OIDC(Trusted Publishing)는 npm 11.5.1+ 필요. runner 기본 npm 이 낮아 최신화한다.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # 태그 버전과 package.json 버전이 일치하는지 확인 (불일치 배포 방지)
      - name: verify version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag($TAG) != package.json($PKG)"; exit 1
          fi

      # 인증은 OIDC(Trusted Publishing)로 자동 처리. 토큰 불필요.
      - run: npm publish --provenance --access public
