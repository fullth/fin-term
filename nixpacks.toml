# Railway Nixpacks 빌드 정의 (레포 루트) — fin-term web 단일 서비스.
# Root Directory 설정 없이 레포 루트에서 web/ 의 client·server 를 빌드·구동한다.
# client(Vite) 정적 빌드 → server(BFF, tsx 런타임) 구동. BFF 가 web/client/dist 까지 서빙.
# server 는 레포 루트 src/sources/* 를 상대 import 하므로 레포 전체가 빌드 컨텍스트에 있어야 한다.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm --prefix web/server ci || npm --prefix web/server install"]

[phases.build]
cmds = [
  "npm --prefix web/client ci || npm --prefix web/client install",
  "npm --prefix web/client run build",
]

[start]
cmd = "npm --prefix web/server start"
