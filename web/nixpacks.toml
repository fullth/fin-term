# Railway Nixpacks 빌드 정의 — fin-term web 단일 서비스.
# client(Vite) 정적 빌드 → server(BFF, tsx 런타임) 구동. BFF 가 client/dist 까지 서빙.
# 주의: server 는 레포 루트의 src/sources/* 를 상대 import 하므로 레포 전체가 배포 컨텍스트에 있어야 한다.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm --prefix server ci || npm --prefix server install"]

[phases.build]
# 클라이언트 정적 빌드 (client/dist 생성)
cmds = ["npm --prefix client ci || npm --prefix client install", "npm --prefix client run build"]

[start]
# tsx 로 BFF 직접 구동 (PORT 는 Railway 가 주입). dist 가 있으면 정적까지 한 포트로 서빙.
cmd = "npm --prefix server start"
